NOTE: 请新建一个名为 `[mvu_update]变量更新规则` 的 D0 条目，将代码块中的内容复制到该条目中
```yaml
---
变量更新规则:
  世界:
    当前历法:
      type: |-
        {
          年: number;
          月: string;
          日: number;
          时段: string;
          天气: string;
        }
      check:
        - 每次行动、旅行、营业、休息、烹饪、购物、收获、酿造后，根据剧情实际推进更新。
        - 小行动通常只推进同一时段内的少量时间，旅行、整晚营业、睡眠才允许跨时段或跨日。
        - 天气只在剧情明确变化、时间跨度较大、或世界规则要求时更新。
    当前地点:
      type: |-
        {
          区域: string;
          具体位置: string;
          坐标: { x: number; y: number };
        }
      check:
        - 用户明确移动到新地点、商铺、酒馆区域、地图节点或客房时更新。
        - 若只是查看地图或预览城市，不改变当前地点。

  酒馆:
    名称:
      check:
        - 只有用户明确为酒馆改名时更新。
    声望:
      type: number
      range: 0~100
      check:
        - 根据营业表现、上菜质量、顾客评价、事件处理结果小幅调整。
        - 普通单次变化不超过 ±5，重大事件才允许更大变化。
    资金铜币:
      type: number
      check:
        - 购物、上菜收钱、住宿收入、设施添加、赔偿、奖励后更新。
        - 所有钱币统一折算为铜币。
    今日营业状态:
      check:
        - 根据当前是否开业、暂停、打烊、忙碌、整顿等状态更新。
    区域:
      type: |-
        {
          [区域名: string]: {
            状态: string;
            风格: string;
            描述: string;
            分配员工: string;
            设施: {
              [设施名: string]: {
                状态: string;
                风格: string;
                描述: string;
                价格折合铜币: number;
              }
            };
            客房: {
              [房间名: string]: {
                类型: string;
                住客: string;
                价格折合铜币: number;
                舒适: number;
                私密: number;
                清洁: number;
                设施: {
                  [房间设施名: string]: {
                    状态: string;
                    描述: string;
                  }
                };
              }
            };
          }
        }
      check:
        - 酒馆区域采用添加设施的模式，不把区域写成单纯升级。
        - 用户添加设施时，在对应区域的设施中插入新设施，并扣除资金铜币。
        - 客房区可以有多个房间，每个房间的设施、住客、价格、舒适、私密、清洁独立更新。
        - 分配员工时只记录名字，不记录职位；员工移动到别的区域时同步改动。

  主角:
    当前状态:
      check:
        - 只有主角状态明显变化时更新，如疲惫、专注烹饪、正在招待客人、外出购物。
    所在位置:
      check:
        - 主角移动到酒馆区域、商铺、地图节点或客房时更新。
    生命:
      type: |-
        {
          当前值: number;
          阶段: string;
        }
      check:
        - 受伤、治疗、休息、疾病、战斗或明显消耗时更新。
        - 阶段文字应概括状态，例如安好、轻伤、负伤、重伤、濒危。
    精力:
      type: |-
        {
          当前值: number;
          阶段: string;
        }
      check:
        - 烹饪、购物、营业、劳动、旅行会降低；休息、饮食、睡眠会恢复。
        - 阶段文字应概括状态，例如充沛、尚可、疲倦、虚弱、力竭。
    烹饪等级:
      type: |-
        {
          等级: number;
          称号: string;
          做菜次数: number;
          下级所需次数: number;
        }
      check:
        - 厨艺等级通过做菜次数增加，不因一次剧情描述凭空跳级。
        - 每次完成做菜、做饮品、做酱时，可按实际规则增加次数。
        - 等级称号按 1烧火工、2守灶童、3灶台学徒、4行炉工、5持勺匠、6灶台师傅、7首席灶师、8灶火宗师更新。

  库房:
    食材:
      type: |-
        {
          [食材批次名: string]: {
            数量: number;
            标签: string[];
            价格折合铜币: number;
          }
        }
      check:
        - 买菜、收菜、获得战利品、烹饪消耗食材时更新。
        - 自产食材每次收获视为一个批次，同批共享 1 个标签；特殊肥料、异常天气、魔法土壤或细心照料可增加第 2 个标签。
        - 标签只影响风味倾向，不改变食材本体分类。
        - 数量降为 0 时移除该批次。
    调料:
      type: |-
        {
          [调料名: string]: {
            数量: number;
            标签: string[];
            价格折合铜币: number;
          }
        }
      check:
        - 购买、采集、烹饪消耗、制酱消耗时更新。
        - 数量降为 0 时移除。
    成品:
      type: |-
        {
          [成品名: string]: {
            数量: number;
            标签: string[];
            搭配判定: '灾难级' | '严重冲突' | '轻微冲突' | '无冲突' | '经典搭配' | '绝佳搭配' | '奇迹';
            价格折合铜币: number;
          }
        }
      check:
        - 做菜、做酱、做饮品后若产物可直接上桌，加入成品或酒水。
        - 上菜会减少数量并增加资金铜币。
        - 成品的风味、口感、适食场景等信息都压缩进标签，不额外拆字段。
        - 搭配判定按菜品生成引擎判定，只能使用灾难级、严重冲突、轻微冲突、无冲突、经典搭配、绝佳搭配、奇迹。
    酒水:
      type: |-
        {
          [酒水名: string]: {
            数量: number;
            标签: string[];
            搭配判定: '灾难级' | '严重冲突' | '轻微冲突' | '无冲突' | '经典搭配' | '绝佳搭配' | '奇迹';
            价格折合铜币: number;
          }
        }
      check:
        - 做饮品、开桶灌装、购买酒水、售卖酒水后更新。
        - 开桶灌装完成后应从酒窖桶移除或改为已空桶状态，并把产物加入酒水。
        - 酒水的强弱、香气、口感、适饮场景都压缩进标签，不额外拆字段。
        - 搭配判定按饮品生成结果判定，只能使用灾难级、严重冲突、轻微冲突、无冲突、经典搭配、绝佳搭配、奇迹。
    杂物:
      type: |-
        {
          [杂物名: string]: {
            数量: number;
            标签: string[];
            价格折合铜币: number;
          }
        }
      check:
        - 种子、燃料、清洁用品、工具、衣物、设施材料等都可记录在杂物。
        - 播种会消耗种子并更新农田。

  人物羁绊:
    type: |-
      {
        [配角名: string]: {
          种族: string;
          身份: string;
          羁绊阶段: number;
          阶段文字: string;
          好感: number;
          心情: string;
          所在位置: string;
          生命: { 当前值: number; 阶段: string };
          精力: { 当前值: number; 阶段: string };
          膀胱: { 当前值: number; 阶段: string };
          备注: string;
        }
      }
    check:
      - 只为配角记录，不把主角写进人物羁绊。
      - 只记录会持续互动、会被主角再次遇见或已形成关系的配角；一次性路人、已死亡且不再互动的人、背景群众不要写入人物羁绊。
      - 新增配角时必须写清 种族、身份、所在位置、心情、生命、精力、膀胱、好感、备注；缺少基础身份信息时不要新增人物羁绊。
      - 种族和身份是稳定设定；不知道就不要猜，不要默认写“人类”“同伴”。只有剧情明确、用户设定或正式转化时才更新。
      - 备注只写稳定角色信息、背景目标、长期线索或需要后续记住的补充设定；不要写“资料来自变量”“由 MVU 生成”等系统来源说明。
      - 配角互动、送礼、冲突、共同劳动、上菜评价后，可调整好感、心情和羁绊阶段。
      - 生命、精力、膀胱都同时保留数字和阶段文字；数字给前端，阶段文字给 AI 描写。
      - CG 图床属于前端或角色资料配置，不进入 MVU 剧情变量。

  农田与酒窖:
    农田:
      type: |-
        {
          [田畦名: string]: {
            状态: string;
            作物: string;
            播种日: string;
            成熟日: string;
            预计产出: string;
            批次标签: string[];
          }
        }
      check:
        - 空田畦可以由用户选择种子播种；播种时消耗杂物中的对应种子。
        - 收获时把产物同步加入库房.食材，并清空或更新田畦状态。
        - 每次收获生成一个批次，同批次共享标签。
    酒窖桶:
      type: |-
        {
          [桶名: string]: {
            状态: string;
            内容物: string;
            类型: string;
            酿造开始日: string;
            收获日: string;
            预计产出: string;
          }
        }
      check:
        - 做饮品、做酱、发酵、陈酿、木桶熟成后，若需要等待，就写入酒窖桶。
        - 桶需要记录名字、开始日、收获日、内容物和预计产出。
        - 开桶灌装完成后，对应桶不能继续保持满桶状态。

  街坊商铺:
    当前商铺:
      check:
        - 用户明确去某个商铺、摊位、工会、店铺时更新。
        - 若用户自由输入地点，AI 应根据关键词选择或生成合适商铺。
    商铺:
      type: |-
        {
          [商铺名: string]: {
            类型: string;
            店主: string;
            氛围: string;
            招呼语: string;
            今日货架: {
              [商品名: string]: {
                分类: string;
                数量: number;
                单价折合铜币: number;
                标签: string[];
                备注: string;
              }
            };
          }
        }
      check:
        - 进入商铺时生成或刷新 9~10 个适合当前店铺的商品。
        - 用户购买商品后减少货架数量、扣除资金铜币，并加入库房对应分类。
        - 商铺叙事应是中世纪西幻风格，避免东方商会感；使用街坊商铺、摊位、工会、作坊等称呼。

  地图:
    当前地点:
      check:
        - 只有用户启程或剧情实际移动后更新。
        - 单纯点击地图预览城市不更新当前地点。
    当前坐标:
      type: |-
        { x: number; y: number }
      check:
        - 与当前地点同步。
    节点:
      type: |-
        {
          [地点名: string]: {
            所属: string;
            性质: string;
            主标签: string;
            地形: string;
            坐标: { x: number; y: number };
            描述: string;
            相邻: {
              [相邻地点名: string]: {
                距离公里: number;
                路线类型: string;
                预计耗时: string;
              }
            };
          }
        }
      check:
        - 新增地点时写入坐标、描述、性质、地形和相邻路线。
        - 距离按游戏旅行尺度记录，不必等同真实大陆比例。
        - 相邻路线优先记录本地生活圈、区域交通圈、跨区干线三种层级。
    商路:
      type: |-
        {
          [商路名: string]: {
            类型: string;
            经过节点: string[];
            状态: string;
          }
        }
      check:
        - 五条主商路为翡叶香路、铁砧隘路、绢稻之路、沙金之路、铁砧海路。
        - 商路只记录连接节点和状态，不需要在变量里写完整路线详情。

  编年摘要:
    type: |-
      {
        [楼层编号: string]: {
          时间: string;
          地点: string;
          人物: string[];
          事件: string;
          总结: string;
        }
      }
    check:
      - 每次 assistant 输出 <sum> 时，把本楼层时间、地点、人物、事件和总结写入。
      - 总结保持 1~2 句话，便于读档和快速回忆剧情。
```
