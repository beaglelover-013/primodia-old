---
变量更新规则:
  总则:
    - 只更新本回合被用户行动、AI剧情结果、前端结算或明确时间推进影响到的变量。
    - replace 用于已有字段改值；delta 用于纯数字增减；insert 用于新增对象；remove 用于删除归零、清空或离场对象。
    - 数值不得小于 0；当前值不得超过上限；数量归零时优先 remove 对应条目。
    - 不要 replace 整个父对象，例如 主角、酒馆、世界、库房、行囊、临时状态；只更新最小字段或具体条目。
    - 生命、精力、声望、好感、资金、库存数量必须基于当前变量值增减，不要凭叙事重新猜一个总数。
    - 输出路径必须使用正式中文字段名；不要输出英文别名、临时字段、分析字段或不存在的字段。
    - 前端已经声明“已结算”的钱、库存、农田、酒窖和设施，不要重新估算，除非正文明确发现结算错误；商铺货架只来自 <shop> 临时块，不写入长期变量。

  世界:
    时代:
      - 只在自定义开局、正式时代切换或世界观重置时更新。
      - 普通剧情、回忆、传闻和角色说法不改变时代。
    地区:
      - 只在开局、跨地区旅行、迁居或明确进入新地区时更新。
      - 城市内移动只更新 当前地点，不更新 地区。
    当前历法:
      - 用户行动、移动、营业、购物、烹饪、锻炼、休息、睡眠、收获、酿造后按实际消耗推进 时间。
      - 小动作通常推进数分钟；换地点、采购、劳动、营业可推进十几分钟到数小时；睡眠、长途旅行或跳过空白才跨日。
      - 跨日或跨月时同步 年、月份序号、月份名、季节、日。
      - 月份对应：1冰封月、2残雪月、3解冻月、4花萌月、5绿涨月、6长日月、7炎阳月、8收获月、9金叶月、10落穗月、11霜降月、12暗夜月。
      - 时间字段只能写 24 小时制 HH:mm，例如 "15:00"；不要写 "约15:00"、"下午三点"、"傍晚" 或 null。
      - 不要输出 时段 字段；时段由前端根据 时间 自动显示。
      - 不要更新 天气 字段；天气由前端天气池决定。
    当前地点:
      - 只在用户或剧情实际移动到新区、酒馆区域、商铺、地图节点或客房时更新。
      - 区域写城市/大地区，具体位置写当前位置文本。
      - 只是查看地图、预览城市、回忆地点、谈论地点或提到远方，不改变当前地点。
      - 具体位置直接使用当前生成里的地点文本，不要把自由地点强行归类成固定地点。
      - 移动后同步更新 主角.所在位置。
      - 离开商铺时同步清空 街坊商铺.当前商铺。

  酒馆:
    名称:
      - 只在正式改名、产权变化或用户明确要求改名时更新。
    所属领地:
      - 只在自定义开局、迁馆、跨领地经营或产权迁移时更新。
      - 城市内移动、临时外出、商铺采购不改变所属领地。
    所在城市:
      - 只在自定义开局、迁馆或酒馆实际迁到另一座城市时更新。
      - 主角外出旅行不改变酒馆所在城市。
    声望:
      - 声望总范围为 0~9999，分为五档：0-200 无人知晓，200-1000 略有耳闻，1000-3000 小有名气，3000-5000 远近闻名，5000+ 声名远扬。
      - 普通顺利营业或顾客满意：声望.数值 +20~+80。
      - 特色菜成功、小事件被称赞、解决客人问题：声望.数值 +80~+180。
      - 卫生问题、食物事故、冲突或严重失误：声望.数值 -80~-240。
      - 只对 酒馆.声望.数值 使用 delta；当数值跨档时，必须同步 replace 酒馆.声望.阶段、酒馆.声望.名称、酒馆.声望.乘数、酒馆.声望.范围，以及 酒馆.声望值、酒馆.声望名。
      - 阶段乘数固定为：无人知晓 1.1，略有耳闻 1.2，小有名气 1.4，远近闻名 1.7，声名远扬 2。
  资金:
      - 资金分为 随身钱袋 与 钱匣；五种面额与 折算合计铜币 必须同步，酒馆.资金.折算合计铜币 为两者合计。
      - 外出采购、送礼、路上消费优先扣 随身钱袋；酒馆营业收入、客房收入进入 钱匣；建设、维护、经营支出优先扣 钱匣。
      - 货币换算：100铜=1银，10银=1金，500金=1铂金，500铂金=1秘银。
      - 任一面额不得为负；大额收入或支出必须有明确来源或消费对象。
      - 前端已完成扣款或收款时，不要在同一回合重复扣钱或重复加钱。
      - 余额不足就是余额不足；不要赊账，不要自动混用另一处资金。
    今日营业状态:
      - 可用状态建议：准备营业、营业中、暂停营业、打烊、忙碌整顿、休业修缮。
      - 开始营业、暂停、关店、修缮或事故整顿时 replace；普通行动不改变营业状态。
    整体概况:
      - 当酒馆整体状态、已可用空间、待整理角落、经营气质或长期变化被正文明确改变时更新。
      - 整体概况用于概括“现在这间酒馆是什么样”，可以写尚未成立的空间潜力，但不要把潜力直接当成区域。
    区域:
      - 酒馆.区域 是动态 record；新区域不受固定区域清单限制，路径示例：/酒馆/区域/后院柴棚/状态。
      - 新开局默认只写当前确定存在或可用的基础空间：主厅接待区、柜台酒水区、厨房餐食区、客房。
      - 只有正文实际清理、搭建、修缮、长期使用、正式命名某个空间时，才新增或更新对应区域；普通路过、提到、幻想未来用途不新增区域。
      - 客房可以作为 酒馆.区域 的总览空间；具体房间仍写入 酒馆.客房。
      - 区域和设施状态只使用：崭新、整洁、良好、忙乱、肮脏、破损、停用、升级中。
      - 普通经过不更新区域状态；清扫、烹饪、营业、搬运、事故、修缮、添置设施时更新。
      - 清扫通常提升 1 档，完整清扫可提升 2 档；使用或忙乱通常下降 1 档。
      - 状态字段不得写自然描述；自然描述只能写进 描述。
      - 新建设施写入对应区域的 设施；不要把设施当成普通库存物品。
    客房:
      - 入住、退房、清洁、损坏、修缮、装修或增减房间设施时更新。
      - 舒适、私密、清洁为 0~100。

  主角:
    种族:
      - 只在自定义开局、正式转化、变身长期固化或用户明确改设定时更新。
      - 伪装、服饰、别人误认或临时称呼不改变种族。
    当前状态:
      - 只写短状态，如 准备营业、疲惫、专注、休息中、受伤。
      - 行动导致明显体力、心情或处境变化时 replace。
    一句话穿着:
      - 换衣、衣物破损、清洁或剧情明确变化时 replace。
    生命:
      - 轻微擦伤/不适：-1~-5；普通受伤：-6~-15；严重事故或战斗：-16~-40。
      - 治疗、包扎、休息可恢复，但不超过上限。
      - 生命.上限只在长期养成、魔法、重大剧情或正式设定变化后更新。
      - 阶段文字随当前值与上限比例更新，例如健康、轻伤、重伤、濒危；不要只改阶段而不改数值。
    精力:
      - 轻微动作：-1~-3；普通采购/简单清扫/短途移动：-4~-10。
      - 烹饪、搬运、挖土、种植、连续采购、紧张交涉：-10~-25。
      - 长时间营业、重体力劳动、长途旅行、锻炼：-20~-40。
      - 饮食、小憩、正式休息、睡眠可恢复；睡眠通常恢复到上限。
      - 锻炼或长期养成事件可提高 精力.上限 +1~+3。
      - 精力只能更新 当前值、上限、阶段；普通行动不要把精力直接清零。
      - 阶段文字随当前值与上限比例更新，例如充沛、尚可、疲倦、虚弱、力竭；不要只改阶段而不改数值。
      - 如果本回合只是短动作，优先使用 delta 小幅增减，不要 replace 成 0 或 100。
    烹饪等级:
      - 做菜、做酱、做饮品成功后可增加 做菜次数。
      - 达到 下级所需次数 后可提升 等级，并同步更新 称号。

  库房:
    - 固定五类：食材、调料、成品、酒水、杂物；不要新增第六类。
    - 整理入库、收获、制作完成后按实际数量 insert/delta 到对应分类。
    - 从库房取出到行囊时，库房对应条目 delta 负数或归零 remove，同时行囊增加同名同类条目。
    - 烹饪、播种、酿造、售卖按实际消耗 delta 负数；数量归零 remove 具体条目。
    - 前端已结算时，以前端数量和分类为准。
    - 食材、调料、杂物条目至少包含 数量、标签、价格折合铜币。
    - 成品和酒水必须带 搭配判定；没有明确判定时用 无冲突。

  行囊:
    - 固定五类：食材、调料、成品、酒水、杂物；结构与库房一致。
    - 商铺购买默认先加入 行囊，不直接进入库房。
    - 从库房取出、路上购买、路上携带时加入 行囊。
    - 路上使用、整理入库、丢弃或交给他人时按实际数量 delta/remove。
    - 外出时优先使用 行囊；在酒馆内可使用 行囊 或 库房。
    - 整理入库必须同时减少 行囊 并增加 库房；前端已结算时不要重复移动。
    - 从库房取出到行囊必须同时减少 库房 并增加 行囊；前端已结算时不要重复移动。
    - 路上购买、携带、使用、交给他人、掉落、被偷、临时寄存，只改 行囊，不改 库房。

  临时状态:
    - 使用物品、短期魔法、环境布置或明确剧情影响可以 insert 临时状态。
    - 状态对象只写 名称、剩余回合、描述、来源物品。
    - 路径示例：/临时状态/主角/-、/临时状态/酒馆/-、/临时状态/酒馆区域/主厅接待区/-、/临时状态/人物/橘柒/-。
    - 不写 prompt_text；描述保持自然短句，由前端下一回合直接发送。
    - 前端会在成功生成后让已有临时状态剩余回合 -1，归零移除。
    - 临时状态只表达短期影响，不替代正式变量；受伤、位置、库存、资金等仍写正式变量。
    - 新增状态通常持续 1~5 回合；除非用户明确要求或剧情特别强烈，不要写长期常驻状态。

  人物羁绊:
    - 只记录配角，不把主角写入人物羁绊。
    - 只记录会持续互动、会被主角再次遇见或已形成关系的配角；一次性路人、已死亡且不再互动的人、背景群众不要写入人物羁绊。
    - 新增配角时必须写清 种族、身份、所在位置、一句话穿着、心情、生命、精力、膀胱、好感、个人资金、收入、备注；缺少基础身份信息时不要新增人物羁绊。
    - 个人资金 使用五币种与 折算合计铜币；只记录该配角自己的可支配钱，不要和酒馆随身钱袋/钱匣混用。
    - 收入 至少包含 职业、日收入折合铜币、结算方式、备注；没确认收入时写 0 和“未确认”，不要省略字段。
    - 种族和身份是稳定设定；不知道就不要猜，不要默认写“人类”“同伴”。只有剧情明确、用户设定或正式转化时才更新。
    - 一句话穿着只写当前可见衣着/外观，不知道就不要更新；不要写“衣着暂未记录”这类占位文字。
    - 备注只写稳定角色信息、背景目标、长期线索或需要后续记住的补充设定；不要写“资料来自变量”“由 MVU 生成”等系统来源说明。
    - 互动、送礼、冲突、共同劳动、事件评价后更新好感、心情、阶段、位置、穿着、生命、精力、膀胱或备注。
    - 好感普通友好 +1~+3；合心礼物/共同劳动 +3~+8；重要事件 +8~+15。
    - 小冲突 -1~-5；严重冲突或背叛 -8~-20。

  农田与酒窖:
    - 播种消耗种子并写入农田；收获写入库房食材。
    - 开始酿造写入酒窖桶；开桶完成后移除或改为空桶。
    - 农田阶段、阶段上限、播种日、成熟日、预计产出、批次标签必须同步。
    - 酒窖桶状态、内容物、类型、酿造开始日、收获日、预计产出必须同步。

  街坊商铺:
    - 这里只记录 当前商铺，不保存商铺资料、商品目录或货架数量。
    - 进入商铺时写 当前商铺；离开商铺或寻找下一家时清空 当前商铺。
    - 商铺与货架由 <shop> 块交给前端临时维护，禁止写入 街坊商铺.商铺、今日货架、商品 或类似字段。
    - 购买结果只更新实际发生变化的资金与行囊；前端已结算时不要重复扣钱或重复加入行囊。

  开局:
    - 自定义开局时，前端会从 0 层 InitVar 克隆 stat_data，并覆盖 世界.时代、世界.地区、世界.当前地点、酒馆.名称、酒馆.所属领地、酒馆.所在城市、酒馆.今日营业状态、主角字段。
    - 开局地点含义：世界.地区=领地，世界.当前地点.区域=城市，世界.当前地点.具体位置=酒馆位置。
    - AI 不需要在开局正文里输出变量补丁；第 1 层变量由前端创建。
